version: 2

sources:
  - name: hardware_raw
    schema: hardware_raw
    tables:
      - name: raw_sensor_data
        columns:
          - name: sensor_entry_id
            tests:
            - unique
            - not_null

          - name: collection_ts
            tests:
            - not_null

          - name: machine_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'observed_machines')
                field: machine_id

          - name: test_run_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'raw_test_run_data')
                field: test_run_id

          - name: hardware_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'hardware_types')
                field: hardware_id

          - name: hardware_field_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'hardware_fields')
                field: field_id   

          - name: sensor_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'sensor_types')
                field: sensor_id      

      - name: raw_test_run_data
        columns:
          - name: test_run_id
            tests:
            - unique
            - not_null

          - name: machine_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'observed_machines')
                field: machine_id 

          - name: test_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'test_types')
                field: test_id 

          - name: instver_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'instruction_version_types')
                field: instver_id

          - name: load_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'load_types')
                field: load_id 

          - name: mode_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'mode_types')
                field: mode_id 

          - name: dataset_id
            tests:
            - not_null
            - relationships:
                to: source('hardware_raw', 'data_sets')
                field: dataset_id 

          - name: run_date
            tests:
            - unique
            - not_null  

      - name: observed_machines
        columns:
          - name: machine_id
            tests: 
            - unique
            - not_null

      - name: hardware_types
        columns:
          - name: hardware_id
            tests:
            - unique
            - not_null

      - name: hardware_fields
        columns:
          - name: field_id
            tests:
            - unique
            - not_null
            
      - name: sensor_types
        columns:
          - name: sensor_id
            tests:
            - unique
            - not_null

      - name: test_types
        columns:
          - name: test_id
            tests:
            - unique
            - not_null

      - name: data_sets
        columns:
          - name: dataset_id
            tests:
            - unique
            - not_null

      - name: load_types
        columns:
          - name: load_id
            tests:
            - unique
            - not_null

      - name: mode_types
        columns:
          - name: mode_id
            tests:
            - unique
            - not_null

      - name: instruction_version_types
        columns:
          - name: instver_id
            tests:
            - unique
            - not_null